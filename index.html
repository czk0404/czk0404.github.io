<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汽车驾驶游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <div class="left-controls">
                <button id="leftBtn" class="control-btn direction-btn">←</button>
                <button id="rightBtn" class="control-btn direction-btn">→</button>
            </div>
            <div class="center-controls">
                <button id="restartBtn" class="control-btn restart-btn">重新开始</button>
                <div class="gear-controls">
                    <button id="forwardBtn" class="control-btn gear-btn active">前进</button>
                    <button id="reverseBtn" class="control-btn gear-btn">倒车</button>
                </div>
            </div>
            <div class="right-controls">
                <button id="throttleBtn" class="control-btn throttle-btn">油门</button>
                <button id="brakeBtn" class="control-btn brake-btn">刹车</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
